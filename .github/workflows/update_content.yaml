name: Trigger Blog Build

on:
  push:
    branches:
      - main # 或者你用于内容更新的分支

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BLOGWEBAPP_APP_ID }}
          private-key: ${{ secrets.BLOGWEBAPP_PRIVATE_KEY }}
          owner: poloxue
          repositories: blog

      - name: Trigger Blog Repository Build
        run: |
          curl -X POST -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
          https://api.github.com/repos/poloxue/blog/dispatches \
          -d '{"event_type": "content-update"}'
